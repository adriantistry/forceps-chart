document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  }\n\n  sizeFor(n) {\n    const s = {\n      1: [44, 44], 2: [54, 52], 3: [56, 54],\n      4: [44, 46], 5: [42, 46],\n      6: [40, 50], 7: [34, 42], 8: [40, 44]\n    };\n    return s[n] || [40, 44];\n  }\n\n  renderVals() {\n    const cx = 350, cy = 320, rx = 290, ry = 290;\n    const lower = (this.state.arch === 'lower');\n    const LREF = 220;\n    const data = this.data();\n    const sel = this.state.selected;\n    const bgRect = React.createElement('rect', {\n      key: 'bg', x: -60, y: -60, width: 520, height: 600, fill: '#fcfcfd',\n      onClick: () => { if (this.state.selected != null) this.setState({ selected: null, forcepIdx: null, answers: [] }); },\n      style: { cursor: sel != null ? 'pointer' : 'default' }\n    });\n\n    const cat = (n) => {\n      if (n === 1 || n === 2 || n === 3) return 'molar';\n      if (n === 4 || n === 5) return 'premolar';\n      if (n === 6) return 'canine';\n      return 'incisor';\n    };\n\n    // Crown outline, occlusal/incisal view, centred on origin.\n    // Local axes: -y = buccal/labial (outer), +y = lingual (inner), x = mesiodistal.\n    const crownPath = (c, a, b) => {\n      const r = Math.min(a, b);\n      if (c === 'molar') {\n        const k = r * 0.55;\n        return 'M ' + (-a + k) + ',' + (-b) +\n          ' L ' + (a - k) + ',' + (-b) +\n          ' Q ' + a + ',' + (-b) + ' ' + a + ',' + (-b + k) +\n          ' L ' + a + ',' + (b - k) +\n          ' Q ' + a + ',' + b + ' ' + (a - k) + ',' + b +\n          ' L ' + (-a + k) + ',' + b +\n          ' Q ' + (-a) + ',' + b + ' ' + (-a) + ',' + (b - k) +\n          ' L ' + (-a) + ',' + (-b + k) +\n          ' Q ' + (-a) + ',' + (-b) + ' ' + (-a + k) + ',' + (-b) + ' Z';\n      }\n      if (c === 'premolar') {\n        return 'M 0,' + (-b) +\n          ' C ' + (a * 0.85) + ',' + (-b) + ' ' + a + ',' + (-b * 0.4) + ' ' + a + ',0' +\n          ' C ' + a + ',' + (b * 0.55) + ' ' + (a * 0.7) + ',' + b + ' 0,' + b +\n          ' C ' + (-a * 0.7) + ',' + b + ' ' + (-a) + ',' + (b * 0.55) + ' ' + (-a) + ',0' +\n          ' C ' + (-a) + ',' + (-b * 0.4) + ' ' + (-a * 0.85) + ',' + (-b) + ' 0,' + (-b) + ' Z';\n      }\n      if (c === 'canine') {\n        return 'M 0,' + (-b) +\n          ' Q ' + (a * 0.95) + ',' + (-b * 0.45) + ' ' + (a * 0.7) + ',' + (b * 0.35) +\n          ' Q ' + (a * 0.45) + ',' + b + ' 0,' + b +\n          ' Q ' + (-a * 0.45) + ',' + b + ' ' + (-a * 0.7) + ',' + (b * 0.35) +\n          ' Q ' + (-a * 0.95) + ',' + (-b * 0.45) + ' 0,' + (-b) + ' Z';\n      }\n      const ci = a * 0.58;\n      return 'M ' + (-a) + ',' + (-b * 0.45) +\n        ' Q ' + (-a) + ',' + (-b) + ' 0,' + (-b) +\n        ' Q ' + a + ',' + (-b) + ' ' + a + ',' + (-b * 0.45) +\n        ' Q ' + a + ',' + (b * 0.4) + ' ' + ci + ',' + (b * 0.9) +\n        ' Q 0,' + b + ' ' + (-ci) + ',' + (b * 0.9) +\n        ' Q ' + (-a) + ',' + (b * 0.4) + ' ' + (-a) + ',' + (-b * 0.45) + ' Z';\n    };\n\n    const groovePaths = (c, a, b) => {\n      if (c === 'molar') {\n        return [\n          'M ' + (-a * 0.5) + ',0 Q 0,' + (b * 0.06) + ' ' + (a * 0.5) + ',0',\n          'M ' + (-a * 0.1) + ',0 L ' + (-a * 0.16) + ',' + (-b * 0.5),\n          'M ' + (-a * 0.05) + ',0 L ' + (-a * 0.32) + ',' + (b * 0.48),\n          'M ' + (a * 0.08) + ',0 L ' + (a * 0.32) + ',' + (b * 0.48)\n        ];\n      }\n      if (c === 'premolar') {\n        return ['M ' + (-a * 0.55) + ',0 Q 0,' + (b * 0.12) + ' ' + (a * 0.55) + ',0'];\n      }\n      if (c === 'canine') {\n        return ['M 0,' + (-b * 0.6) + ' L 0,' + (b * 0.45)];\n      }\n      return [\n        'M ' + (-a * 0.32) + ',' + (-b * 0.7) + ' L ' + (-a * 0.32) + ',' + (-b * 0.25),\n        'M 0,' + (-b * 0.72) + ' L 0,' + (-b * 0.25),\n        'M ' + (a * 0.32) + ',' + (-b * 0.7) + ' L ' + (a * 0.32) + ',' + (-b * 0.25)\n      ];\n    };\n\n    const teeth = [];\n    for (let i = 0; i < 8; i++) {\n      const n = i + 1;\n      const f = i / 15;\n      const ang = Math.PI * (1 - f);\n      const ca = Math.cos(ang), sa = Math.sin(ang);\n      const x = cx + rx * ca;\n      const y = cy - ry * sa;\n      const [w, h] = this.sizeFor(n);\n      const deg = Math.atan2(-sa, ca) * 180 / Math.PI + 90;\n      const c = cat(n);\n      const isSel = sel === n;\n      const rad = deg * Math.PI / 180;\n      const off = h * 0.24;\n      const yR = lower ? (2 * LREF - y) : y;\n      const degR = lower ? -deg : deg;\n      const lxR = x - off * Math.sin(rad);\n      const lyU = y + off * Math.cos(rad);\n      const lyR = lower ? (2 * LREF - lyU) : lyU;\n      teeth.push({\n        num: n,\n        disp: lower ? (33 - n) : n,\n        transform: 'translate(' + x.toFixed(2) + ' ' + yR.toFixed(2) + ') rotate(' + degR.toFixed(2) + ')',\n        d: crownPath(c, w / 2, h / 2),\n        grooves: groovePaths(c, w / 2, h / 2),\n        fill: isSel ? '#4f5bd5' : '#ffffff',\n        stroke: isSel ? '#4f5bd5' : '#c4c9d4',\n        grooveStroke: isSel ? 'rgba(255,255,255,0.75)' : '#b4bac6',\n        sw: isSel ? 2 : 1.5,\n        lx: lxR,\n        ly: lyR,\n        labelFill: isSel ? '#ffffff' : '#5b6473',\n        onClick: () => this.setState({ selected: n, forcepIdx: null, answers: [] })\n      });\n    }\n\n    const toothLayer = React.createElement(\n      'g',\n      { key: 'teeth' },\n      teeth.map(t => React.createElement(\n        'g',\n        { key: t.num, transform: t.transform },\n        React.createElement('path', {\n          d: t.d,\n          fill: t.fill,\n          stroke: t.stroke,\n          strokeWidth: t.sw,\n          strokeLinejoin: 'round',\n          onClick: t.onClick,\n          style: { cursor: 'pointer' }\n        }),\n        t.grooves.map((g, gi) => React.createElement('path', {\n          key: gi,\n          d: g,\n          fill: 'none',\n          stroke: t.grooveStroke,\n          strokeWidth: 1.1,\n          strokeLinecap: 'round',\n          style: { pointerEvents: 'none' }\n        }))\n      ))\n    );\n\n    const numberLayer = React.createElement(\n      'g',\n      { key: 'numbers', style: { pointerEvents: 'none' } },\n      teeth.map(t => React.createElement('text', {\n        key: t.num,\n        x: t.lx,\n        y: t.ly,\n        textAnchor: 'middle',\n        dominantBaseline: 'central',\n        fill: t.labelFill,\n        style: { fontFamily: \"'Spline Sans Mono', monospace\", fontSize: '12px', fontWeight: 600 }\n      }, String(t.disp)))\n    );\n\n    let selObj = null;\n    let forcepChips = null;\n    let forcepReveal = null;\n    let guidePanel = null;\n    let resetBtn = null;\n    if (sel) {\n      const t = data.teeth[sel];\n      const list = t.forceps;\n      selObj = { num: lower ? (33 - t.num) : t.num, name: t.name, side: t.side };\n      resetBtn = React.createElement('div', {\n        key: 'resetbar',\n        style: { width: '100%', display: 'flex', justifyContent: 'flex-end', marginBottom: '8px' }\n      }, React.createElement('span', {\n        onClick: () => this.setState({ answers: [], forcepIdx: null }),\n        title: 'Reset',\n        'aria-label': 'Reset',\n        style: { display: 'inline-flex', alignItems: 'center', cursor: 'pointer', color: '#4f5bd5', padding: '2px' }\n      }, React.createElement('svg', {\n        width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none',\n        stroke: '#4f5bd5', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round'\n      },\n        React.createElement('polyline', { key: 'p1', points: '1 4 1 10 7 10' }),\n        React.createElement('path', { key: 'p2', d: 'M3.51 15a9 9 0 1 0 2.13-9.36L1 10' })\n      )));\n\n      const answers = this.state.answers || [];\n      let cursor = data.tree[sel];\n      const trail = [];\n      for (let k = 0; k < answers.length; k++) {\n        if (!cursor || cursor.forcep) break;\n        const opt = cursor.a[answers[k]];\n        if (!opt) break;\n        trail.push({ q: cursor.q, label: opt.label });\n        cursor = opt.node;\n      }\n\n      // A forceps is chosen only by an explicit chip tap, or once the guide\n      // reaches a recommendation (immediately for single-option teeth).\n      const raw = this.state.forcepIdx;\n      let chosen = null;\n      if (raw != null) chosen = list[Math.min(raw, list.length - 1)];\n      else if (cursor && cursor.forcep) chosen = cursor.forcep;\n\n      if (chosen != null) forcepChips = React.createElement(\n        'div',\n        { key: 'chips', style: { display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '14px' } },\n        list.map((id, i) => {\n          const on = chosen != null && id === chosen;\n          return React.createElement('span', {\n            key: id,\n            onClick: () => this.setState({ forcepIdx: i }),\n            style: {\n              fontFamily: \"'Spline Sans Mono', monospace\",\n              fontSize: '15px',\n              fontWeight: 500,\n              padding: '6px 14px',\n              borderRadius: '999px',\n              cursor: 'pointer',\n              border: '1px solid ' + (on ? '#4f5bd5' : '#c4c9d4'),\n              background: on ? '#4f5bd5' : '#ffffff',\n              color: on ? '#ffffff' : '#4f5bd5'\n            }\n          }, id);\n        })\n      );\n\n      if (chosen != null) {\n        const fc = data.forceps[chosen];\n        forcepReveal = React.createElement('img', {\n          key: 'fimg',\n          src: fc.img,\n          alt: chosen + ' forceps',\n          style: { display: 'block', width: '100%', maxWidth: '420px', margin: '16px auto 0', borderRadius: '10px', border: '1px solid #e6e8ec' }\n        });\n      }\n\n      const gKids = [];\n      gKids.push(React.createElement('div', {\n        key: 'gh',\n        style: { fontFamily: \"'Spline Sans Mono', monospace\", fontSize: '11px', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#9aa1ad', marginBottom: '8px' }\n      }, 'Decision guide'));\n      if (cursor && cursor.forcep) {\n        gKids.push(React.createElement('div', {\n          key: 'rec',\n          style: { fontSize: '15p
